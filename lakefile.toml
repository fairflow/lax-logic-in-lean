name = "lax-logic"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LaxLogic"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "LaxLogic"

# `laxrun` builds green, but on THIS toolchain (v4.22.0-rc3 + current Mathlib
# cache) the resulting binary segfaults at startup: the cache-shipped C IR of
# (at least) Mathlib.Data.Set.Basic contains a code-generator miscompile —
# `_init_l_Set_instBoundedOrder___closed__0` allocates `lean_alloc_ctor(0,2,0)`
# and returns it with both object fields UNINITIALISED (they should be the
# erased `lean_box(0)`), so `lean_mark_persistent` NULL-derefs in the module
# initialiser chain.  The interpreter never runs that C, which is why the
# library and all `#eval`s are unaffected.  Until the toolchain is bumped past
# the fix, run the CLI through the interpreter: `scripts/laxrun.sh <args>`
# (= `lake env lean --run Main.lean <args>`).  Full analysis in Main.lean.
[[lean_exe]]
name = "laxrun"
root = "Main"
