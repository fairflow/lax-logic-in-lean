name = "lax-logic"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LaxLogic"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"

[package.dependencies]
verso = { git = "https://github.com/leanprover/verso", rev = "main" }

[[lean_lib]]
name = "LaxLogic"
