name = "lax-logic"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LaxLogic"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "LaxLogic"

# Historical note: on v4.22.0-rc3 the `laxrun` binary segfaulted at startup
# (cache-shipped C IR miscompile in Mathlib.Data.Set.Basic; full analysis in
# Main.lean's history).  FIXED by the v4.31.0 toolchain bump (adopted here,
# 2026-07-19): native executables build and run; `scripts/laxrun.sh` remains
# as an interpreter fallback.
[[lean_exe]]
name = "laxrun"
root = "Main"

# Shared wip modules that other wip files import (lake resolves imports
# only against declared targets; exe roots alone don't cover imports).
[[lean_lib]]
name = "wipshared"
globs = ["wip.oracle2", "wip.semui_ctx_core"]

# The two-sided decision tool (countermodel-first; wip/oracle2.lean) and its
# one-sided baseline, compiled — the native oracle route.
[[lean_exe]]
name = "oracle2"
root = "wip.oracle2_run"

[[lean_exe]]
name = "o2base"
root = "wip.oracle2_baseline"

# The constraint-commutation probe (route doc §0(j)), compiled.
[[lean_exe]]
name = "ctxprobe"
root = "wip.semui_ctx_probe"

# The frame-relative fallibility-prediction probe (route doc §0(j)).
[[lean_exe]]
name = "ctxrel"
root = "wip.semui_ctx_rel"

# Certifier: failed commutation rows → checkB-verified countermodels.
[[lean_exe]]
name = "ctxcert"
root = "wip.semui_ctx_cert"

# The constraint-pool experiment (variant saturations).
[[lean_exe]]
name = "poolprobe"
root = "wip.semui_pool"

# The certified reconstruction-law sweep.
[[lean_exe]]
name = "lawsweep"
root = "wip.semui_lawsweep"

# Reproduction of the large-object harness claims.
[[lean_exe]]
name = "weightrepro"
root = "wip.semui_repro"

# Frontier-row investigation.
[[lean_exe]]
name = "frontrow"
root = "wip.frontier_row"

# ◯-free fragment vs IPC agreement sweep.
[[lean_exe]]
name = "ofreesweep"
root = "wip.ofree_sweep"

# One-◯ two-variable fragment: values + tower coverage.
[[lean_exe]]
name = "oneboxsweep"
root = "wip.onebox_sweep"

# Description-realisability probe: canonical triples + the gfp on
# battery instances.
[[lean_exe]]
name = "descprobe"
root = "wip.desc_probe"

# Direct ∀-residue probe: small-variant search per (frame, x).
[[lean_exe]]
name = "residprobe"
root = "wip.resid_probe"
