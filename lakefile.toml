name = "lax-logic"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["LaxLogic"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "LaxLogic"

# Historical note: on v4.22.0-rc3 the `laxrun` binary segfaulted at startup
# (cache-shipped C IR miscompile in Mathlib.Data.Set.Basic; full analysis in
# Main.lean's history).  FIXED by the v4.31.0 toolchain bump (adopted here,
# 2026-07-19): native executables build and run; `scripts/laxrun.sh` remains
# as an interpreter fallback.
[[lean_exe]]
name = "laxrun"
root = "Main"

# The two-sided decision tool (countermodel-first; wip/oracle2.lean) and its
# one-sided baseline, compiled — the native oracle route.
[[lean_exe]]
name = "oracle2"
root = "wip.oracle2"

[[lean_exe]]
name = "o2base"
root = "wip.oracle2_baseline"
